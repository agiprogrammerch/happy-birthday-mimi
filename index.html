<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Mimi 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Klee+One&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #f7c5cc;
      --sakura: #f4a0b0;
      --deep-rose: #c0405a;
      --cream: #fdf6f0;
      --ink: #1a0a0f;
      --gold: #d4a853;
      --sage: #8faf8a;
      --mist: rgba(247, 197, 204, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px;
      height: 12px;
      background: var(--sakura);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease;
      mix-blend-mode: multiply;
    }
    .cursor-trail {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--blush);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: 0.6;
    }

    /* Petals canvas */
    #petalCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Background grid texture */
    .bg-texture {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(244,160,176,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,160,176,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Splash screen */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .splash-date {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      color: var(--sakura);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }
    .splash-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--cream);
      line-height: 1.1;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 0.9s forwards;
    }
    .splash-title span {
      color: var(--sakura);
    }
    .splash-kanji {
      font-family: 'Klee One', cursive;
      font-size: 1.1rem;
      color: rgba(247,197,204,0.5);
      letter-spacing: 0.3em;
      margin-top: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.3s forwards;
    }
    .splash-btn {
      margin-top: 3rem;
      padding: 0.9rem 2.8rem;
      border: 1px solid var(--sakura);
      background: transparent;
      color: var(--cream);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 1s ease 1.7s forwards;
      transition: background 0.3s, color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .splash-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sakura);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
      z-index: -1;
    }
    .splash-btn:hover::before { transform: translateX(0); }
    .splash-btn:hover { color: var(--ink); }

    /* Music prompt */
    .music-prompt {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
      color: rgba(247,197,204,0.5);
      letter-spacing: 0.2em;
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
      z-index: 101;
    }
    .music-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--sakura);
      animation: pulse 2s ease-in-out infinite;
    }

    /* Main container */
    #main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
    }
    #main.visible { opacity: 1; }

    /* Decorative corner lines */
    .corner {
      position: fixed;
      width: 80px; height: 80px;
      opacity: 0.3;
    }
    .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--sakura); border-left: 1px solid var(--sakura); }
    .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--sakura); border-right: 1px solid var(--sakura); }
    .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--sakura); border-left: 1px solid var(--sakura); }
    .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--sakura); border-right: 1px solid var(--sakura); }

    /* Center content */
    .date-label {
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      color: var(--deep-rose);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeUp 1s ease forwards;
    }
    .main-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      text-align: center;
      position: relative;
    }
    .main-heading .line2 {
      font-style: italic;
      color: var(--deep-rose);
      display: block;
    }
    .main-heading .mimi {
      position: relative;
      display: inline-block;
    }
    .main-heading .mimi::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--sakura), var(--blush));
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      animation: lineReveal 1s ease 0.8s forwards;
    }

    .subtitle {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: rgba(26,10,15,0.5);
      letter-spacing: 0.2em;
      text-align: center;
      font-weight: 300;
    }

    /* Nav dots to pages */
    .page-nav {
      margin-top: 3.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      cursor: pointer;
    }
    .nav-orb {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1.5px solid var(--sakura);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
      background: transparent;
    }
    .nav-item:hover .nav-orb {
      background: var(--sakura);
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 12px 30px rgba(192,64,90,0.2);
    }
    .nav-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--ink);
      opacity: 0.5;
      text-transform: uppercase;
    }

    /* Floating sakura accent */
    .sakura-accent {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.25;
      animation: floatAccent 6s ease-in-out infinite;
      pointer-events: none;
    }
    .sakura-accent:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
    .sakura-accent:nth-child(2) { top: 25%; right: 8%; animation-delay: 1.5s; }
    .sakura-accent:nth-child(3) { bottom: 20%; left: 7%; animation-delay: 3s; }
    .sakura-accent:nth-child(4) { bottom: 30%; right: 12%; animation-delay: 4.5s; }

    /* Audio control */
    .audio-ctrl {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(192,64,90,0.3);
      background: rgba(253,246,240,0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      font-size: 1rem;
      transition: transform 0.2s;
    }
    .audio-ctrl:hover { transform: scale(1.1); }
    .bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 16px;
    }
    .bar {
      width: 3px;
      background: var(--deep-rose);
      border-radius: 2px;
      animation: barAnim 0.8s ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { height: 60%; animation-delay: 0s; }
    .bar:nth-child(2) { height: 100%; animation-delay: 0.15s; }
    .bar:nth-child(3) { height: 40%; animation-delay: 0.3s; }
    .bar.paused { animation-play-state: paused; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineReveal {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.5); opacity: 1; }
    }
    @keyframes floatAccent {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(10deg); }
    }
    @keyframes barAnim {
      from { transform: scaleY(0.4); }
      to { transform: scaleY(1); }
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>
<canvas id="petalCanvas"></canvas>
<div class="bg-texture"></div>

<!-- Splash / Entry -->
<div id="splash">
  <div class="splash-date">March 25, 2026</div>
  <h1 class="splash-title">A day made<br>for <span>Mimi</span></h1>
  <p class="splash-kanji">誕生日おめでとう</p>
  <button class="splash-btn" id="enterBtn">Enter ✦</button>
  <div class="music-prompt">
    <div class="music-dot"></div>
    <span>Music included</span>
  </div>
</div>

<!-- Main page -->
<div id="main">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="sakura-accent">🌸</div>
  <div class="sakura-accent">✿</div>
  <div class="sakura-accent">🌸</div>
  <div class="sakura-accent">✦</div>

  <p class="date-label">March 25 · A Special Day</p>

  <h1 class="main-heading">
    Happy<br>
    <span class="line2">Birthday,<br>
    <span class="mimi">Mimi</span></span>
  </h1>

  <p class="subtitle">誕生日おめでとう · Momo Akuta · 25th March</p>

  <nav class="page-nav">
    <a href="letter.html" class="nav-item">
      <div class="nav-orb">💌</div>
      <span class="nav-label">Letter</span>
    </a>
    <a href="memories.html" class="nav-item">
      <div class="nav-orb">🌸</div>
      <span class="nav-label">Memories</span>
    </a>
    <a href="wishes.html" class="nav-item">
      <div class="nav-orb">🌟</div>
      <span class="nav-label">Wishes</span>
    </a>
    <a href="promise.html" class="nav-item">
      <div class="nav-orb">🗾</div>
      <span class="nav-label">Promise</span>
    </a>
  </nav>
</div>

<!-- Audio control -->
<div class="audio-ctrl" id="audioCtrl" title="Toggle music">
  <div class="bars">
    <div class="bar" id="b1"></div>
    <div class="bar" id="b2"></div>
    <div class="bar" id="b3"></div>
  </div>
</div>
<audio id="bgMusic" loop>
  <source src="hbd.mpeg" type="audio/mpeg">
</audio>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const trail = document.getElementById('cursorTrail');
  let tx = 0, ty = 0;
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    setTimeout(() => {
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';
    }, 80);
  });

  // Petal canvas
  const canvas = document.getElementById('petalCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const petals = [];
  const petalColors = ['#f4a0b0','#f7c5cc','#fce4ec','#f48fb1','#e91e63'];
  for (let i = 0; i < 28; i++) {
    petals.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 8 + 4,
      speed: Math.random() * 1.2 + 0.4,
      drift: (Math.random() - 0.5) * 0.8,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.04,
      color: petalColors[Math.floor(Math.random() * petalColors.length)],
      opacity: Math.random() * 0.4 + 0.15
    });
  }

  function drawPetal(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function animatePetals() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      drawPetal(p);
    });
    requestAnimationFrame(animatePetals);
  }
  animatePetals();

  // Music & Enter
  const audio = document.getElementById('bgMusic');
  const splash = document.getElementById('splash');
  const main = document.getElementById('main');
  const bars = document.querySelectorAll('.bar');
  let playing = false;

  document.getElementById('enterBtn').addEventListener('click', () => {
    splash.classList.add('hidden');
    main.classList.add('visible');
    // Try autoplay
    audio.volume = 0.45;
    audio.play().then(() => {
      playing = true;
    }).catch(() => {});
  });

  document.getElementById('audioCtrl').addEventListener('click', () => {
    if (playing) {
      audio.pause();
      playing = false;
      bars.forEach(b => b.classList.add('paused'));
    } else {
      audio.play();
      playing = true;
      bars.forEach(b => b.classList.remove('paused'));
    }
  });
</script>
</body>
</html>
